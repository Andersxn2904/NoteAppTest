services:
  notasapp:
    build:
      context: ./NoteAppCore
      dockerfile: Dockerfile
    container_name: notasapp
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - /mnt/data/apps/noteapptest/dpkeys:/root/.aspnet/DataProtection-Keys
    restart: unless-stopped
